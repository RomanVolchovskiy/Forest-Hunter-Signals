name: hunting_signals
description: "Мисливська сигнальна музика - додаток для вивчення та прослуховування традиційних мисливських сигналів з категоріями, аудіо, відео, нотами та навчальними матеріалами."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio and video playback
  audioplayers: ^6.1.0
  video_player: ^2.9.2

  # State management
  provider: ^6.1.5+1

  # Local storage (залишається як офлайн-кеш)
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI enhancements
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  carousel_slider: ^5.0.0

  # Image handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # ─── FIREBASE ────────────────────────────────────────────────
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  # ─────────────────────────────────────────────────────────────

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/video/
    - assets/icons/
    - assets/notations/
